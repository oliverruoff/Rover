<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#12161a">
  <title>Rover Control</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png?v=1">
  <link rel="icon" type="image/png" sizes="192x192" href="/rover_icon.png?v=1">
  <link rel="shortcut icon" href="/favicon.ico?v=1">
  <link rel="apple-touch-icon" href="/rover_icon.png?v=1">
  <style>
    :root {
      --steel-1: #1a1d20;
      --steel-2: #2a2f34;
      --steel-3: #3b434a;
      --plate: #14181c;
      --panel: #20262b;
      --panel-2: #171b1f;
      --cat-yellow: #f1c40f;
      --cat-yellow-dim: #c99e06;
      --warn: #d6452a;
      --ok: #8abf46;
      --text: #f4f6f8;
      --muted: #a2adb8;
      --line: #47525d;
    }
    html, body {
      width: 100%;
      min-height: 100%;
      overflow-x: hidden;
      overflow-y: auto;
      background: #12161a;
    }
    body {
      margin: 0;
      font-family: "Arial Black", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        linear-gradient(0deg, rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.3)),
        repeating-linear-gradient(
          -45deg,
          #0f1215 0 18px,
          #12161a 18px 36px
        );
    }
    .wrap {
      max-width: none;
      width: 100%;
      margin: 0 auto;
      padding: 20px 14px calc(24px + env(safe-area-inset-bottom));
      display: grid;
      gap: 16px;
      min-height: 100dvh;
      box-sizing: border-box;
      grid-template-rows: auto minmax(0, 1fr);
    }
    .panel {
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(0, 0, 0, 0.1)),
        linear-gradient(180deg, var(--panel), var(--panel-2));
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.06);
    }
    h1 {
      margin: 0;
      font-size: 1.45rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--cat-yellow);
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
    }
    .panel:first-child {
      border-top: 4px solid var(--cat-yellow);
    }
    .grid {
      display: grid;
      gap: 10px;
      grid-template-columns: 1fr;
       grid-template-rows: auto auto auto;
       grid-template-areas:
         "camera"
         "aux"
         "control";
       min-height: 0;
       overflow: visible;
       align-items: start;
       align-content: start;
      }
    .grid > .panel {
      min-height: 0;
      height: auto;
    }
     .grid.swap-sides #controlPanel {
       grid-area: camera;
     }
     .grid.swap-sides #cameraPanel {
       grid-area: control;
     }
     @media (min-width: 900px) {
       .grid {
         grid-template-columns: 1fr 1fr;
         grid-template-rows: 1fr auto;
         grid-template-areas:
           "control camera"
           "aux aux";
       }

       .grid.swap-sides {
         grid-template-areas:
           "camera control"
           "aux aux";
       }

       .camera {
         height: 100%;
       }
    }

    @media (min-width: 900px) and (orientation: portrait) {
      html, body {
        overflow-y: hidden;
      }

      .wrap {
        height: 100dvh;
        padding: 12px 10px calc(14px + env(safe-area-inset-bottom));
        gap: 10px;
      }

      .grid {
        align-items: stretch;
      }

      .grid > .panel {
        height: 100%;
      }

      .panel {
        padding: 12px;
      }

      h1 {
        font-size: 1.22rem;
      }

      .topbar {
        gap: 10px;
        margin-bottom: 4px;
      }

      .layout-btn {
        padding: 7px 9px;
        font-size: 0.74rem;
      }

      .status {
        gap: 6px;
        font-size: 0.78rem;
        max-height: 22px;
      }

      .status-toggle {
        padding: 1px 6px;
        font-size: 0.6rem;
      }

      .badge {
        padding: 4px 8px;
      }

      .collapsible {
        padding: 5px 8px;
        margin-bottom: 8px;
      }

      .collapsible:not([open]) {
        padding: 2px 8px;
        margin-bottom: 1px;
      }

      #sliderPanel:not([open]) + .drive-zone {
        margin-top: 0;
      }

      .collapsible-body {
        margin-top: 4px;
      }

      .row {
        gap: 6px;
        margin: 7px 0;
      }

      label {
        font-size: 0.8rem;
      }

      .value-pill {
        min-width: 48px;
        font-size: 0.76rem;
        padding: 2px 8px;
      }

      input[type="range"] {
        height: 28px;
      }

      .drive-zone {
        min-height: 150px;
        margin: 4px 0 6px;
      }

      .motor-bar-track {
        width: 68px;
      }

      .joystick {
        width: min(40vw, 220px);
        height: min(40vw, 220px);
      }

      .joystick-knob {
        width: 60px;
        height: 60px;
        left: calc(50% - 30px);
        top: calc(50% - 30px);
      }

      .numbers {
        font-size: 0.7rem;
        padding: 7px 8px;
        margin-top: 6px;
      }

      .btns {
        gap: 8px;
        margin-top: 6px;
      }

      button {
        padding: 10px;
        font-size: 0.82rem;
      }

      #controlPanel {
        display: flex;
        flex-direction: column;
      }

      #cameraPanel {
        display: flex;
        flex-direction: column;
        min-height: 0;
      }

      .camera {
        flex: 1 1 auto;
        min-height: 0;
      }

      .hint {
        display: none;
      }

      #cameraPanel .hint {
        display: none;
      }
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 6px;
    }
    .layout-btn {
      padding: 8px 10px;
      font-size: 0.8rem;
      background: transparent;
      color: var(--cat-yellow);
      border: 0;
      box-shadow: none;
      white-space: nowrap;
    }
    .collapsible {
      border: 0;
      border-radius: 8px;
      padding: 6px 8px;
      margin-bottom: 10px;
      background: transparent;
    }
    .collapsible:not([open]) {
      padding: 2px 8px;
      margin-bottom: 2px;
    }
    #sliderPanel:not([open]) {
      margin-bottom: 0;
    }
    #sliderPanel:not([open]) + .drive-zone {
      margin-top: 0;
    }
    .collapsible > summary {
      cursor: pointer;
      user-select: none;
      color: #d7dde4;
      font-size: 0.78rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      font-weight: 800;
      list-style: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .collapsible > summary::-webkit-details-marker {
      display: none;
    }
    .collapsible > summary::before {
      content: ">";
      color: var(--cat-yellow);
      transform: rotate(0deg);
      transition: transform 0.12s ease;
      font-family: monospace;
      font-size: 0.95rem;
      line-height: 1;
    }
    .collapsible[open] > summary::before {
      transform: rotate(90deg);
    }
    .collapsible-body {
      margin-top: 6px;
    }
    .row {
      display: grid;
      gap: 10px;
      grid-template-columns: 1fr;
      align-items: center;
      margin: 10px 0;
    }
    .row-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }
    label {
      font-weight: 800;
      font-size: 0.88rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #d7dde4;
    }
    .value-pill {
      min-width: 56px;
      text-align: right;
      font-family: "Consolas", "Courier New", monospace;
      font-size: 0.85rem;
      color: #111;
      background: linear-gradient(180deg, #ffd845, #c99e06);
      border: 1px solid #f5d358;
      border-radius: 999px;
      padding: 3px 10px;
      font-weight: 800;
    }
    input[type="range"] {
      width: 100%;
      accent-color: var(--cat-yellow);
      -webkit-appearance: none;
      appearance: none;
      background: transparent;
      height: 34px;
    }
    input[type="range"]::-webkit-slider-runnable-track {
      height: 10px;
      border-radius: 999px;
      border: 1px solid #58626c;
      background:
        repeating-linear-gradient(
          -45deg,
          #2d353d 0 8px,
          #253038 8px 16px
        );
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.35);
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 22px;
      height: 22px;
      margin-top: -7px;
      border-radius: 4px;
      border: 1px solid #f5d358;
      background: linear-gradient(180deg, #ffd845, #bd9206);
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.45);
    }
    input[type="range"]::-moz-range-track {
      height: 10px;
      border-radius: 999px;
      border: 1px solid #58626c;
      background:
        repeating-linear-gradient(
          -45deg,
          #2d353d 0 8px,
          #253038 8px 16px
        );
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.35);
    }
    input[type="range"]::-moz-range-thumb {
      width: 22px;
      height: 22px;
      border-radius: 4px;
      border: 1px solid #f5d358;
      background: linear-gradient(180deg, #ffd845, #bd9206);
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.45);
    }
    .numbers {
      display: block;
      color: var(--muted);
      font-size: 0.76rem;
      line-height: 1.35;
      font-family: "Consolas", "Courier New", monospace;
      background: #101317;
      border: 1px solid #3a424a;
      border-radius: 8px;
      padding: 8px 10px;
      margin-top: 8px;
      overflow-wrap: anywhere;
    }
    .status-wrap {
      display: grid;
      gap: 4px;
    }
    .status {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      font-size: 0.76rem;
      max-height: 24px;
      overflow: hidden;
    }
    .status.expanded {
      max-height: 120px;
    }
    .status-toggle {
      display: none;
      align-self: start;
      border: 0;
      border-radius: 999px;
      padding: 2px 8px;
      background: transparent;
      color: var(--text);
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }
    .status-wrap.has-overflow .status-toggle {
      display: inline-flex;
    }
    .badge {
      background: linear-gradient(180deg, #2a3138, #1a1f24);
      border: 1px solid #4f5963;
      border-radius: 999px;
      padding: 3px 8px;
      font-weight: 700;
      letter-spacing: 0.03em;
      line-height: 1.15;
    }
    .ok { color: var(--ok); }
    .warn { color: #ff8b72; }
    .btns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 8px;
    }
    #controlPanel {
      grid-area: control;
    }
    button {
      border: 1px solid #59636e;
      border-radius: 8px;
      padding: 12px;
      font-weight: 800;
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      cursor: pointer;
      transition: transform 0.1s ease, filter 0.1s ease;
    }
    button:active {
      transform: translateY(1px);
      filter: brightness(0.95);
    }
    #deadman {
      background: linear-gradient(180deg, #ffd845, var(--cat-yellow-dim));
      color: #171717;
      border: 1px solid #f5d358;
      touch-action: none;
    }
    #estop {
      background: linear-gradient(180deg, #df5138, #9f2718);
      color: #fff;
      border: 1px solid #f07a64;
    }
    #flipLeft,
    #flipRight {
      background: linear-gradient(180deg, #56616c, #303840);
      color: #f4f6f8;
      border: 1px solid #7a8792;
    }
    #auxPanel {
      grid-area: aux;
      padding: 8px 10px;
    }
    .aux-strip {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }
    .aux-btn {
      position: relative;
      display: grid;
      place-items: center;
      min-width: 0;
      min-height: 64px;
      padding: 10px 6px;
      background: linear-gradient(180deg, #56616c, #303840);
      color: #e6ebf0;
      border: 1px solid #7a8792;
    }
    .aux-btn svg {
      width: 30px;
      height: 30px;
      display: block;
      pointer-events: none;
    }
    .aux-btn .aux-indicator {
      position: absolute;
      right: 8px;
      bottom: 8px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #49525b;
      border: 1px solid rgba(255, 255, 255, 0.22);
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.25);
      pointer-events: none;
    }
    .aux-btn.is-on {
      color: #171717;
      border-color: #f5d358;
      box-shadow: 0 0 0 1px rgba(241, 196, 15, 0.25), 0 0 18px rgba(241, 196, 15, 0.18);
    }
    .aux-btn.light-front.is-on {
      background: linear-gradient(180deg, #ffe067, #d8a907);
    }
    .aux-btn.light-back.is-on {
      background: linear-gradient(180deg, #ff9b88, #c74029);
      color: #fff;
      border-color: #f07a64;
      box-shadow: 0 0 0 1px rgba(223, 81, 56, 0.25), 0 0 18px rgba(223, 81, 56, 0.18);
    }
    .aux-btn.is-on .aux-indicator {
      background: currentColor;
    }
    .aux-btn.light-back.is-on .aux-indicator {
      background: #fff;
    }
    .aux-btn.is-active {
      background: linear-gradient(180deg, #ffd845, #bd9206);
      color: #171717;
      border-color: #f5d358;
    }
    .camera {
      width: 100%;
      border-radius: 8px;
      border: 2px solid #5b6670;
      background: #101317;
      height: auto;
      min-height: 0;
      object-fit: cover;
      box-shadow: inset 0 0 0 1px #101317;
    }
    #cameraPanel {
      grid-area: camera;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .hint {
      color: var(--muted);
      font-size: 0.87rem;
    }
    .joystick-wrap {
      margin: 6px 0;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .drive-zone {
      position: relative;
      min-height: 182px;
      margin: 6px 0 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .motor-bar-track {
      width: 88px;
      position: absolute;
      top: 0;
      bottom: 0;
      border: 1px solid #5c6670;
      border-radius: 5px;
      background: linear-gradient(180deg, #1b2025, #101317);
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.45);
      overflow: hidden;
      touch-action: none;
      cursor: ns-resize;
    }
    .motor-speed-label {
      position: absolute;
      left: 50%;
      bottom: 4px;
      transform: translateX(-50%);
      min-width: 40px;
      text-align: center;
      font-family: "Consolas", "Courier New", monospace;
      font-size: 0.7rem;
      color: #111;
      background: linear-gradient(180deg, #ffd845, #bd9206);
      border: 1px solid #f5d358;
      border-radius: 999px;
      padding: 1px 6px;
      font-weight: 800;
      pointer-events: none;
      user-select: none;
      z-index: 3;
    }
    .motor-bar-track.left {
      left: 0;
    }
    .motor-bar-track.right {
      right: 0;
    }
    .motor-bar-center {
      position: absolute;
      left: 0;
      right: 0;
      top: 50%;
      height: 2px;
      background: rgba(255, 255, 255, 0.22);
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.35);
      pointer-events: none;
    }
    .motor-bar-fill {
      position: absolute;
      left: 0;
      width: 100%;
      height: 0%;
      pointer-events: none;
      transition: height 0.08s linear;
    }
    .motor-bar-fill.forward {
      bottom: 50%;
      background: linear-gradient(180deg, #ffe067, #f1c40f 55%, #c99900);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.25);
    }
    .motor-bar-fill.reverse {
      top: 50%;
      background: linear-gradient(180deg, #ff8168, #df5138 55%, #9f2718);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.18);
    }
    .joystick {
      width: min(62vw, 280px);
      height: min(62vw, 280px);
      max-width: 280px;
      max-height: 280px;
      border-radius: 50%;
      border: 3px solid #6c7782;
      background:
        radial-gradient(circle at 50% 50%, rgba(241, 196, 15, 0.15) 0 16%, transparent 17% 100%),
        linear-gradient(
          180deg,
          rgba(138, 191, 70, 0.25) 0 40%,
          rgba(241, 196, 15, 0.23) 40% 60%,
          rgba(214, 69, 42, 0.26) 60% 100%
        ),
        radial-gradient(circle at 50% 50%, #303840 0, #232a31 66%, #171d22 100%);
      position: relative;
      touch-action: none;
      box-shadow: inset 0 4px 18px rgba(0, 0, 0, 0.45), 0 8px 16px rgba(0, 0, 0, 0.4);
    }
    .zone-label {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.62rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      color: rgba(243, 247, 251, 0.85);
      text-shadow: 0 1px 4px rgba(0, 0, 0, 0.6);
      pointer-events: none;
      user-select: none;
    }
    .zone-top {
      top: 14%;
    }
    .zone-mid {
      top: 50%;
      transform: translate(-50%, -50%);
    }
    .zone-bottom {
      bottom: 14%;
    }
    .joystick-knob {
      width: 76px;
      height: 76px;
      border-radius: 50%;
      border: 3px solid #8d98a3;
      background: radial-gradient(circle at 35% 30%, #606a75 0, #434c55 55%, #2f363d 100%);
      position: absolute;
      left: calc(50% - 38px);
      top: calc(50% - 38px);
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.45);
      transition: transform 0.05s linear;
      pointer-events: none;
    }
    @media (max-width: 680px) {
      .wrap {
        padding: 10px 8px calc(12px + env(safe-area-inset-bottom));
        gap: 8px;
      }
      .panel {
        padding: 9px;
      }
      .drive-zone {
        min-height: 150px;
      }
      h1 {
        font-size: 1.05rem;
      }
      .status {
        font-size: 0.72rem;
        gap: 6px;
      }
      .badge {
        padding: 4px 8px;
      }
      .row {
        gap: 4px;
        margin: 5px 0;
      }
      label {
        font-size: 0.73rem;
      }
      .value-pill {
        min-width: 44px;
        font-size: 0.72rem;
        padding: 2px 8px;
      }
      input[type="range"] {
        height: 24px;
      }
      input[type="range"]::-webkit-slider-runnable-track,
      input[type="range"]::-moz-range-track {
        height: 8px;
      }
      input[type="range"]::-webkit-slider-thumb,
      input[type="range"]::-moz-range-thumb {
        width: 18px;
        height: 18px;
        margin-top: -6px;
      }
      .joystick {
        width: min(46vw, 170px);
        height: min(46vw, 170px);
      }
      .motor-bar-track {
        width: 60px;
      }
      .joystick-knob {
        width: 50px;
        height: 50px;
        left: calc(50% - 25px);
        top: calc(50% - 25px);
      }
      .numbers {
        font-size: 0.68rem;
        padding: 6px;
      }
      .btns {
        gap: 6px;
      }
      .aux-strip {
        gap: 6px;
      }
      .aux-btn {
        min-height: 56px;
        padding: 8px 4px;
      }
      .aux-btn svg {
        width: 24px;
        height: 24px;
      }
      button {
        font-size: 0.74rem;
        padding: 8px;
      }
      .camera {
        height: auto;
      }
      .hint {
        display: none;
      }
    }
    @media (max-width: 680px) and (orientation: portrait) {
      html, body {
        overflow-y: hidden;
      }

      .wrap {
        height: 100dvh;
        padding: 8px 8px calc(10px + env(safe-area-inset-bottom));
        gap: 6px;
        overflow-y: auto;
      }

      .grid {
        gap: 4px;
        grid-template-rows: auto auto minmax(0, 1fr);
        align-content: start;
        min-height: 100%;
      }

      .panel {
        padding: 6px 8px;
      }

      .topbar {
        margin-bottom: 2px;
      }

      h1 {
        font-size: 0.96rem;
      }

      .status {
        max-height: 20px;
        gap: 4px;
        font-size: 0.68rem;
      }

      .badge {
        padding: 3px 6px;
      }

      #cameraPanel {
        padding: 6px 8px;
      }

      .camera {
        max-height: 24dvh;
        min-height: 112px;
        object-fit: cover;
      }

      #controlPanel {
        display: flex;
        flex-direction: column;
        min-height: 0;
        height: 100%;
      }

      #auxPanel {
        padding: 4px 8px;
      }

      .aux-strip {
        gap: 6px;
      }

      .aux-btn {
        min-height: 46px;
        padding: 6px 4px;
      }

      .aux-btn svg {
        width: 22px;
        height: 22px;
      }

      .aux-btn .aux-indicator {
        right: 6px;
        bottom: 6px;
        width: 8px;
        height: 8px;
      }

      .collapsible {
        margin-bottom: 4px;
      }

      .collapsible:not([open]) {
        padding: 1px 8px;
        margin-bottom: 0;
      }

      #sliderPanel:not([open]) + .drive-zone {
        margin-top: 0;
      }

      .collapsible-body {
        margin-top: 2px;
      }

      .row {
        gap: 3px;
        margin: 4px 0;
      }

      label {
        font-size: 0.7rem;
      }

      .value-pill {
        min-width: 42px;
        font-size: 0.68rem;
        padding: 2px 7px;
      }

      input[type="range"] {
        height: 22px;
      }

      .drive-zone {
        flex: 1 1 auto;
        min-height: 180px;
        margin: 0 0 2px;
      }

      .motor-bar-track {
        width: 50px;
      }

      .motor-speed-label {
        font-size: 0.62rem;
        min-width: 34px;
      }

      .joystick {
        width: min(54vw, 220px);
        height: min(54vw, 220px);
        max-width: 100%;
        max-height: 100%;
      }

      .joystick-knob {
        width: 42px;
        height: 42px;
        left: calc(50% - 21px);
        top: calc(50% - 21px);
      }

      .numbers {
        display: none;
      }

      .btns {
        gap: 6px;
        margin-top: 2px;
      }

      button {
        font-size: 0.7rem;
        padding: 7px;
      }
    }
    @media (max-height: 540px) and (orientation: landscape) {
      .wrap {
        max-width: 1220px;
        padding: 8px calc(8px + env(safe-area-inset-right)) calc(10px + env(safe-area-inset-bottom)) calc(8px + env(safe-area-inset-left));
        gap: 8px;
      }
      .grid {
        grid-template-columns: 1fr 1fr;
      }
      .panel {
        padding: 8px;
      }
      .drive-zone {
        min-height: 118px;
      }
      .row {
        margin: 3px 0;
        gap: 3px;
      }
      label {
        font-size: 0.68rem;
      }
      .value-pill {
        min-width: 40px;
        font-size: 0.66rem;
        padding: 2px 6px;
      }
      .joystick {
        width: min(29vw, 140px);
        height: min(29vw, 140px);
      }
      .motor-bar-track {
        width: 56px;
      }
      .joystick-knob {
        width: 44px;
        height: 44px;
        left: calc(50% - 22px);
        top: calc(50% - 22px);
      }
      .numbers {
        display: none;
      }
      .btns {
        gap: 6px;
      }
      .aux-btn {
        min-height: 52px;
      }
      button {
        font-size: 0.72rem;
        padding: 7px;
      }
      .camera {
        height: auto;
      }
      .status {
        font-size: 0.72rem;
      }
      .layout-btn {
        font-size: 0.68rem;
        padding: 7px 8px;
      }
      .hint {
        display: none;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="panel">
      <div class="topbar">
        <h1>Rover Control</h1>
        <button class="layout-btn" id="swapLayout">Toggle Joystick Side</button>
      </div>
      <div class="status-wrap" id="statusWrap">
        <div class="status" id="statusBadges"></div>
        <button class="status-toggle" id="statusToggle" type="button">More</button>
      </div>
    </section>

    <section class="grid" id="mainGrid">
      <article class="panel" id="cameraPanel">
        <div class="topbar">
          <h2>Camera</h2>
          <button class="layout-btn" id="cameraToggle" type="button" aria-pressed="true">Pause Camera</button>
        </div>
        <img class="camera" id="camera" src="/api/camera.mjpg" alt="USB camera stream">
        <p class="hint" id="cameraHint">Live USB camera stream from Raspberry Pi.</p>
      </article>

      <article class="panel" id="auxPanel">
        <div class="aux-strip">
          <button class="aux-btn light-front" id="frontLight" type="button" aria-label="Toggle front lights" title="Front lights">
            <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M7 7c2.8 0 5 2.2 5 5v5H7z" fill="currentColor" stroke="none"></path>
              <path d="M14 8l5-2"></path>
              <path d="M14 12h6"></path>
              <path d="M14 16l5 2"></path>
            </svg>
            <span class="aux-indicator" aria-hidden="true"></span>
          </button>
          <button class="aux-btn light-back" id="backLight" type="button" aria-label="Toggle back lights" title="Back lights">
            <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17 7c-2.8 0-5 2.2-5 5v5h5z" fill="currentColor" stroke="none"></path>
              <path d="M10 8L5 6"></path>
              <path d="M10 12H4"></path>
              <path d="M10 16l-5 2"></path>
            </svg>
            <span class="aux-indicator" aria-hidden="true"></span>
          </button>
          <button class="aux-btn" id="dumperUp" type="button" aria-label="Lift dumper" title="Lift dumper">
            <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 18h16"></path>
              <path d="M6 16h8l3-5H9z"></path>
              <path d="M12 5v6"></path>
              <path d="M9.5 7.5L12 5l2.5 2.5"></path>
            </svg>
          </button>
          <button class="aux-btn" id="dumperDown" type="button" aria-label="Lower dumper" title="Lower dumper">
            <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 18h16"></path>
              <path d="M6 16h8l3-5H9z"></path>
              <path d="M12 7v6"></path>
              <path d="M9.5 10.5L12 13l2.5-2.5"></path>
            </svg>
          </button>
        </div>
      </article>

      <article class="panel" id="controlPanel">
        <details class="collapsible" id="sliderPanel">
          <summary>Fine Tuning</summary>
          <div class="collapsible-body">
            <div class="row">
              <div class="row-head">
                <label for="throttle">Throttle</label>
                <span class="value-pill" id="throttleVal">0%</span>
              </div>
              <input id="throttle" type="range" min="-100" max="100" value="0">
            </div>
            <div class="row">
              <div class="row-head">
                <label for="steer">Steer (left/right)</label>
                <span class="value-pill" id="steerVal">0%</span>
              </div>
              <input id="steer" type="range" min="-100" max="100" value="0">
            </div>
            <div class="row">
              <div class="row-head">
                <label for="maxDac">Max output limit (DAC)</label>
                <span class="value-pill" id="maxDacVal">180</span>
              </div>
              <input id="maxDac" type="range" min="0" max="255" value="180">
            </div>
            <div class="row">
              <div class="row-head">
                <label for="joyMinThrottle">Joystick min throttle (%)</label>
                <span class="value-pill" id="joyMinThrottleVal">45%</span>
              </div>
              <input id="joyMinThrottle" type="range" min="0" max="100" value="45">
            </div>
            <div class="row">
              <div class="row-head">
                <label for="joyMaxThrottle">Joystick max throttle (%)</label>
                <span class="value-pill" id="joyMaxThrottleVal">55%</span>
              </div>
              <input id="joyMaxThrottle" type="range" min="0" max="100" value="55">
            </div>
            <div class="numbers" id="numbers"></div>
          </div>
        </details>

        <div class="drive-zone">
          <div class="motor-bar-track left" id="leftMotorTrack">
            <div class="motor-bar-center"></div>
            <div class="motor-bar-fill forward" id="leftMotorBarFwd"></div>
            <div class="motor-bar-fill reverse" id="leftMotorBarRev"></div>
            <span class="motor-speed-label" id="leftMotorSpeed">0%</span>
          </div>
          <div class="motor-bar-track right" id="rightMotorTrack">
            <div class="motor-bar-center"></div>
            <div class="motor-bar-fill forward" id="rightMotorBarFwd"></div>
            <div class="motor-bar-fill reverse" id="rightMotorBarRev"></div>
            <span class="motor-speed-label" id="rightMotorSpeed">0%</span>
          </div>
          <div class="joystick-wrap">
            <div class="joystick" id="joystick" aria-label="Drive joystick" role="application">
              <span class="zone-label zone-top">FWD</span>
              <span class="zone-label zone-mid">PIVOT</span>
              <span class="zone-label zone-bottom">REV</span>
              <div class="joystick-knob" id="joystickKnob"></div>
            </div>
          </div>
        </div>

        <div class="btns">
          <button id="deadman">Hold To Drive</button>
          <button id="estop">EMERGENCY STOP</button>
          <button id="flipLeft">Flip Left</button>
          <button id="flipRight">Flip Right</button>
        </div>
        <p class="hint">Keyboard: hold Arrow keys (or W/A/S/D) to drive forward/reverse, Space stop. Releasing keys sends 0,0.</p>
      </article>
    </section>
  </main>

  <script>
    const throttleEl = document.getElementById("throttle");
    const steerEl = document.getElementById("steer");
    const maxDacEl = document.getElementById("maxDac");
    const joyMinThrottleEl = document.getElementById("joyMinThrottle");
    const joyMaxThrottleEl = document.getElementById("joyMaxThrottle");
    const throttleValEl = document.getElementById("throttleVal");
    const steerValEl = document.getElementById("steerVal");
    const maxDacValEl = document.getElementById("maxDacVal");
    const joyMinThrottleValEl = document.getElementById("joyMinThrottleVal");
    const joyMaxThrottleValEl = document.getElementById("joyMaxThrottleVal");
    const leftMotorTrackEl = document.getElementById("leftMotorTrack");
    const rightMotorTrackEl = document.getElementById("rightMotorTrack");
    const leftMotorBarFwdEl = document.getElementById("leftMotorBarFwd");
    const leftMotorBarRevEl = document.getElementById("leftMotorBarRev");
    const rightMotorBarFwdEl = document.getElementById("rightMotorBarFwd");
    const rightMotorBarRevEl = document.getElementById("rightMotorBarRev");
    const leftMotorSpeedEl = document.getElementById("leftMotorSpeed");
    const rightMotorSpeedEl = document.getElementById("rightMotorSpeed");
    const numbersEl = document.getElementById("numbers");
    const statusEl = document.getElementById("statusBadges");
    const statusWrapEl = document.getElementById("statusWrap");
    const statusToggleEl = document.getElementById("statusToggle");
    const mainGridEl = document.getElementById("mainGrid");
    const swapLayoutEl = document.getElementById("swapLayout");
    const frontLightEl = document.getElementById("frontLight");
    const backLightEl = document.getElementById("backLight");
    const dumperUpEl = document.getElementById("dumperUp");
    const dumperDownEl = document.getElementById("dumperDown");
    const deadmanEl = document.getElementById("deadman");
    const estopEl = document.getElementById("estop");
    const flipLeftEl = document.getElementById("flipLeft");
    const flipRightEl = document.getElementById("flipRight");
    const joystickEl = document.getElementById("joystick");
    const joystickKnobEl = document.getElementById("joystickKnob");
    const cameraEl = document.getElementById("camera");
    const cameraHintEl = document.getElementById("cameraHint");
    const cameraToggleEl = document.getElementById("cameraToggle");

    function getClientId() {
      const key = "roverClientId";
      const existing = sessionStorage.getItem(key);
      if (existing) return existing;
      const created = `client-${Math.random().toString(36).slice(2, 10)}`;
      sessionStorage.setItem(key, created);
      return created;
    }

    const CONTROL_SEND_INTERVAL_MS = 80;
    const STATUS_POLL_INTERVAL_MS = 500;
    const WS_BUFFER_LIMIT_BYTES = 4096;
    const CAMERA_SRC = "/api/camera.mjpg";

    const state = {
      deadman: false,
      ws: null,
      wsConnected: false,
      usingHttpFallback: false,
      swapSides: localStorage.getItem("roverSwapSides") === "1",
      cameraEnabled: localStorage.getItem("roverCameraEnabled") !== "0",
      clientId: getClientId(),
      serialConnected: false,
      esp32AppRunning: false,
      cameraOk: false,
      leftDirection: "forward",
      rightDirection: "forward",
      leftRelayActive: false,
      rightRelayActive: false,
      driveMode: "idle",
      ack: "",
      outputLeft: 0,
      outputRight: 0,
      lastHttpSendMs: 0,
      lastSentPayload: "",
      pendingControlSend: false,
      barDragging: false,
      barModeActive: false,
      barPointerId: null,
      barLeftPct: 0,
      barRightPct: 0,
      frontLightOn: false,
      backLightOn: false,
      dumperUpActive: false,
      dumperDownActive: false,
    };

    const keyState = {
      up: false,
      down: false,
      left: false,
      right: false,
    };

    const JOY_PIVOT_BAND = 0.20;
    const JOY_STEER_DEADZONE = 0.10;

    function norm(value) {
      return Math.max(-1, Math.min(1, value));
    }

    function payload() {
      const msg = {
        throttle: norm(Number(throttleEl.value) / 100),
        steer: norm(Number(steerEl.value) / 100),
        deadman: state.deadman,
        max_dac: Number(maxDacEl.value),
        client_id: state.clientId,
      };

      if (state.barModeActive) {
        msg.left_cmd = norm(state.barLeftPct / 100);
        msg.right_cmd = norm(state.barRightPct / 100);
      }

      return msg;
    }

    function applyLayoutSwap() {
      mainGridEl.classList.toggle("swap-sides", state.swapSides);
      swapLayoutEl.textContent = "Toggle Joystick Side";
    }

    function applyAuxSnapshot(auxData) {
      state.frontLightOn = Boolean(auxData?.lights?.front);
      state.backLightOn = Boolean(auxData?.lights?.back);
      state.dumperUpActive = Boolean(auxData?.dumper?.up);
      state.dumperDownActive = Boolean(auxData?.dumper?.down);
    }

    function renderAuxControls() {
      frontLightEl.classList.toggle("is-on", state.frontLightOn);
      backLightEl.classList.toggle("is-on", state.backLightOn);
      dumperUpEl.classList.toggle("is-active", state.dumperUpActive);
      dumperDownEl.classList.toggle("is-active", state.dumperDownActive);
      frontLightEl.setAttribute("aria-pressed", state.frontLightOn ? "true" : "false");
      backLightEl.setAttribute("aria-pressed", state.backLightOn ? "true" : "false");
    }

    function joystickThrottlePercent(forwardAmount) {
      const amount = Math.max(0, Math.min(1, forwardAmount));
      if (amount <= 0) {
        return 0;
      }

      const minT = Math.max(0, Math.min(100, Number(joyMinThrottleEl.value)));
      const maxT = Math.max(0, Math.min(100, Number(joyMaxThrottleEl.value)));
      const low = Math.min(minT, maxT);
      const high = Math.max(minT, maxT);
      return Math.round(low + amount * (high - low));
    }

    function syncSliderDisplays() {
      throttleValEl.textContent = `${throttleEl.value}%`;
      steerValEl.textContent = `${steerEl.value}%`;
      maxDacValEl.textContent = `${maxDacEl.value}`;
      joyMinThrottleValEl.textContent = `${joyMinThrottleEl.value}%`;
      joyMaxThrottleValEl.textContent = `${joyMaxThrottleEl.value}%`;

      const maxPossibleOut = 255;
      const leftOut = Math.max(0, Math.min(maxPossibleOut, Number(state.outputLeft) || 0));
      const rightOut = Math.max(0, Math.min(maxPossibleOut, Number(state.outputRight) || 0));
      const leftPct = (leftOut / maxPossibleOut) * 100;
      const rightPct = (rightOut / maxPossibleOut) * 100;
      leftMotorSpeedEl.textContent = `${Math.round(leftPct)}%`;
      rightMotorSpeedEl.textContent = `${Math.round(rightPct)}%`;
      // The status API reports motor directions by drivetrain side, while
      // the on-screen bars are laid out from the operator's mirrored view.
      const leftForward = state.rightDirection !== "reverse";
      const rightForward = state.leftDirection !== "reverse";
      const leftNeutral = leftOut <= 0;
      const rightNeutral = rightOut <= 0;

      if (leftNeutral) {
        leftMotorBarFwdEl.style.height = "0%";
        leftMotorBarRevEl.style.height = "0%";
      } else if (leftForward) {
        leftMotorBarFwdEl.style.height = "0%";
        leftMotorBarRevEl.style.height = "0%";
        leftMotorBarFwdEl.style.height = `${leftPct}%`;
      } else {
        leftMotorBarFwdEl.style.height = "0%";
        leftMotorBarRevEl.style.height = `${leftPct}%`;
      }

      if (rightNeutral) {
        rightMotorBarFwdEl.style.height = "0%";
        rightMotorBarRevEl.style.height = "0%";
      } else if (rightForward) {
        rightMotorBarFwdEl.style.height = "0%";
        rightMotorBarRevEl.style.height = "0%";
        rightMotorBarFwdEl.style.height = `${rightPct}%`;
      } else {
        rightMotorBarFwdEl.style.height = "0%";
        rightMotorBarRevEl.style.height = `${rightPct}%`;
      }
    }

    function updateNumbers() {
      syncSliderDisplays();
      numbersEl.textContent = `throttle=${throttleEl.value} steer=${steerEl.value} joy_min=${joyMinThrottleEl.value} joy_max=${joyMaxThrottleEl.value} max_dac=${maxDacEl.value} dir=${state.leftDirection}/${state.rightDirection} output=${state.outputLeft},${state.outputRight} ack=${state.ack || "-"}`;
    }

    function badge(label, ok, title = "") {
      const cls = ok ? "ok" : "warn";
      const titleAttr = title ? ` title="${title}"` : "";
      return `<span class="badge ${cls}"${titleAttr}>${label}</span>`;
    }

    function updateStatusToggle() {
      const expanded = statusEl.classList.contains("expanded");
      statusToggleEl.textContent = expanded ? "Less" : "More";
    }

    function syncStatusOverflow() {
      requestAnimationFrame(() => {
        const wasExpanded = statusEl.classList.contains("expanded");

        if (wasExpanded) {
          statusEl.classList.remove("expanded");
        }

        const hasOverflow = statusEl.scrollHeight > statusEl.clientHeight + 2;
        statusWrapEl.classList.toggle("has-overflow", hasOverflow);

        if (wasExpanded && hasOverflow) {
          statusEl.classList.add("expanded");
        }

        updateStatusToggle();
      });
    }

    function renderStatus() {
      const transportLabel = state.wsConnected ? "WS" : (state.usingHttpFallback ? "HTTP" : "WS OFF");
      const transportTitle = state.wsConnected ? "WebSocket connected" : (state.usingHttpFallback ? "HTTP fallback active" : "WebSocket offline");
      const cameraTitle = !state.cameraEnabled
        ? "Camera stream paused in browser"
        : (state.cameraOk ? "Camera stream ok" : "Camera on but no fresh frame");
      statusEl.innerHTML = [
        badge(transportLabel, state.wsConnected || state.usingHttpFallback, transportTitle),
        badge(`SER ${state.serialConnected ? "ON" : "OFF"}`, state.serialConnected, `Serial ${state.serialConnected ? "connected" : "offline"}`),
        badge(`APP ${state.esp32AppRunning ? "ON" : "OFF"}`, state.esp32AppRunning, `ESP32 app ${state.esp32AppRunning ? "running" : "not running"}`),
        badge(`L ${state.leftDirection === "reverse" ? "REV" : "FWD"}${state.leftRelayActive ? "*" : ""}`, !state.leftRelayActive, `Left motor ${state.leftDirection}${state.leftRelayActive ? ", flipping relay" : ""}`),
        badge(`R ${state.rightDirection === "reverse" ? "REV" : "FWD"}${state.rightRelayActive ? "*" : ""}`, !state.rightRelayActive, `Right motor ${state.rightDirection}${state.rightRelayActive ? ", flipping relay" : ""}`),
        badge(`MODE ${String(state.driveMode || "-").toUpperCase()}`, true, `Drive mode ${state.driveMode}`),
        badge(`CAM ${state.cameraEnabled ? (state.cameraOk ? "OK" : "WAIT") : "PAUSE"}`, state.cameraEnabled ? state.cameraOk : true, cameraTitle),
        badge(`DM ${state.deadman ? "ON" : "OFF"}`, state.deadman, `Deadman ${state.deadman ? "held" : "released"}`),
      ].join(" ");
      cameraToggleEl.textContent = state.cameraEnabled ? "Pause Camera" : "Resume Camera";
      cameraToggleEl.setAttribute("aria-pressed", state.cameraEnabled ? "true" : "false");
      cameraHintEl.textContent = state.cameraEnabled
        ? "Live USB camera stream from Raspberry Pi. Pause it if controls feel laggy."
        : "Camera stream paused locally to prioritize controls. Click Resume Camera to reconnect.";
      renderAuxControls();
      syncStatusOverflow();
    }

    async function toggleLight(light) {
      const prevFront = state.frontLightOn;
      const prevBack = state.backLightOn;
      const nextActive = light === "front" ? !state.frontLightOn : !state.backLightOn;

      if (light === "front") {
        state.frontLightOn = nextActive;
      } else {
        state.backLightOn = nextActive;
      }

      renderAuxControls();

      try {
        const res = await fetch(`/api/aux/light/${light}`, {
          method: "POST",
        });
        if (!res.ok) {
          throw new Error(`light toggle failed: ${res.status}`);
        }
        const data = await res.json();
        applyAuxSnapshot(data?.aux);
        renderStatus();
      } catch (_) {
        state.frontLightOn = prevFront;
        state.backLightOn = prevBack;
        renderAuxControls();
        pollStatus();
      }
    }

    async function setDumper(direction, active) {
      if (direction === "up") {
        if (state.dumperUpActive === active && (!active || !state.dumperDownActive)) return;
        state.dumperUpActive = active;
        if (active) state.dumperDownActive = false;
      } else {
        if (state.dumperDownActive === active && (!active || !state.dumperUpActive)) return;
        state.dumperDownActive = active;
        if (active) state.dumperUpActive = false;
      }

      renderAuxControls();

      try {
        const res = await fetch(`/api/aux/dumper/${direction}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ active }),
        });
        if (!res.ok) {
          throw new Error(`dumper request failed: ${res.status}`);
        }
        const data = await res.json();
        applyAuxSnapshot(data?.aux);
        renderAuxControls();
      } catch (_) {
        pollStatus();
      }
    }

    function releaseDumperControls() {
      if (state.dumperUpActive) {
        setDumper("up", false);
      }
      if (state.dumperDownActive) {
        setDumper("down", false);
      }
    }

    function markControlDirty(sendNow = false) {
      state.pendingControlSend = true;
      if (sendNow) {
        sendControl(true);
      }
    }

    async function sendControl(force = false) {
      const msg = payload();
      const body = JSON.stringify(msg);
      if (!force && !state.pendingControlSend && body === state.lastSentPayload) {
        return;
      }

      if (!state.ws || state.ws.readyState !== WebSocket.OPEN) {
        const now = Date.now();
        if (!force && now - state.lastHttpSendMs < CONTROL_SEND_INTERVAL_MS) {
          return;
        }
        state.lastHttpSendMs = now;
        try {
          await fetch("/api/control", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body,
          });
          state.usingHttpFallback = true;
          state.pendingControlSend = false;
          state.lastSentPayload = body;
        } catch (_) {
          state.usingHttpFallback = false;
        }
        renderStatus();
        return;
      }

      if (!force && state.ws.bufferedAmount > WS_BUFFER_LIMIT_BYTES) {
        return;
      }

      state.ws.send(body);
      state.pendingControlSend = false;
      state.lastSentPayload = body;
    }

    function connectWs() {
      const proto = location.protocol === "https:" ? "wss" : "ws";
      const ws = new WebSocket(`${proto}://${location.host}/ws`);
      state.ws = ws;
      ws.onopen = () => {
        state.wsConnected = true;
        state.usingHttpFallback = false;
        renderStatus();
        markControlDirty(true);
      };
      ws.onclose = () => {
        state.wsConnected = false;
        state.usingHttpFallback = true;
        renderStatus();
        setTimeout(connectWs, 1000);
      };
      ws.onerror = () => {
        state.wsConnected = false;
        state.usingHttpFallback = true;
        renderStatus();
      };
    }

    async function pollStatus() {
      try {
        const res = await fetch("/api/status", { cache: "no-store" });
        const data = await res.json();
        state.serialConnected = Boolean(data?.serial?.connected);
        state.esp32AppRunning = Boolean(data?.serial?.app_running);
        state.cameraOk = state.cameraEnabled && Boolean(data?.camera?.has_frame);
        state.ack = data?.serial?.last_ack || "";
        state.leftDirection = data?.control?.direction?.left || "forward";
        state.rightDirection = data?.control?.direction?.right || "forward";
        state.leftRelayActive = Boolean(data?.control?.relay?.left_active);
        state.rightRelayActive = Boolean(data?.control?.relay?.right_active);
        state.driveMode = data?.control?.drive_mode || "idle";
        state.outputLeft = data?.control?.output?.left ?? 0;
        state.outputRight = data?.control?.output?.right ?? 0;
        applyAuxSnapshot(data?.aux);
      } catch (_) {
        state.serialConnected = false;
        state.esp32AppRunning = false;
        state.driveMode = "idle";
      }
      updateNumbers();
      renderStatus();
    }

    async function emergencyStop() {
      state.deadman = false;
      state.barModeActive = false;
      throttleEl.value = "0";
      steerEl.value = "0";
      releaseDumperControls();
      renderStatus();
      updateNumbers();
      markControlDirty(true);
      await fetch("/api/stop", { method: "POST" });
    }

    function setDeadman(on) {
      state.deadman = on;
      renderStatus();
      markControlDirty(true);
    }

    function setJoystickVisual(normX, normY) {
      const maxPx = joystickEl.clientWidth * 0.34;
      const xPx = normX * maxPx;
      const yPx = normY * maxPx;
      joystickKnobEl.style.transform = `translate(${xPx}px, ${yPx}px)`;
    }

    function applyJoystick(normX, normY) {
      state.barModeActive = false;
      const throttleRaw = Math.max(-1, Math.min(1, -normY));
      const throttleMag = Math.abs(throttleRaw);
      const maxJoyPercent = Math.max(0, Math.min(100, Number(joyMaxThrottleEl.value)));
      const pivotScale = maxJoyPercent / 100;
      const throttle = throttleMag <= JOY_PIVOT_BAND
        ? 0
        : Math.round(Math.sign(throttleRaw) * joystickThrottlePercent((throttleMag - JOY_PIVOT_BAND) / (1 - JOY_PIVOT_BAND)));

      const steerRaw = Math.max(-1, Math.min(1, normX));
      const steerMag = Math.abs(steerRaw);
      let steer = steerMag <= JOY_STEER_DEADZONE
        ? 0
        : Math.round((Math.sign(steerRaw) * (steerMag - JOY_STEER_DEADZONE) / (1 - JOY_STEER_DEADZONE)) * 100);

      // In pivot zone, cap turn command by joystick max throttle so
      // max speed settings are respected there too.
      if (throttleMag <= JOY_PIVOT_BAND) {
        steer = Math.round(steer * pivotScale);
      }

      steerEl.value = String(Math.max(-100, Math.min(100, steer)));
      throttleEl.value = String(Math.max(-100, Math.min(100, throttle)));
      setJoystickVisual(normX, normY);
      updateNumbers();
      markControlDirty();
    }

    function barPowerFromPointer(trackEl, evt) {
      const rect = trackEl.getBoundingClientRect();
      const y = evt.clientY - rect.top;
      const norm = 1 - (2 * y / rect.height);
      return Math.max(-1, Math.min(1, norm));
    }

    function applyBarDrive(leftPct, rightPct) {
      const left = Math.max(-100, Math.min(100, leftPct));
      const right = Math.max(-100, Math.min(100, rightPct));
      state.barModeActive = true;
      state.barLeftPct = left;
      state.barRightPct = right;

      const leftNorm = left / 100;
      const rightNorm = right / 100;
      const t = (leftNorm + rightNorm) / 2;
      const steer = (leftNorm - rightNorm) / 2;

      throttleEl.value = String(Math.round(t * 100));
      steerEl.value = String(Math.round(steer * 100));
      setJoystickVisual(steer, -t);

      const maxOut = Math.max(0, Math.min(255, Number(maxDacEl.value)));
      state.outputLeft = Math.round((Math.abs(left) / 100) * maxOut);
      state.outputRight = Math.round((Math.abs(right) / 100) * maxOut);

      updateNumbers();
      markControlDirty();
    }

    async function flipSide(side) {
      try {
        await fetch(`/api/flip/${side}`, { method: "POST" });
        await pollStatus();
      } catch (_) {
      }
    }

    function bindHoldAction(buttonEl, direction) {
      let pointerId = null;

      buttonEl.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        pointerId = e.pointerId;
        buttonEl.setPointerCapture(e.pointerId);
        setDumper(direction, true);
      });

      function release(e) {
        if (pointerId === null) return;
        if (e && e.pointerId !== undefined && e.pointerId !== pointerId) return;
        pointerId = null;
        setDumper(direction, false);
      }

      buttonEl.addEventListener("pointerup", release);
      buttonEl.addEventListener("pointercancel", release);
      buttonEl.addEventListener("lostpointercapture", release);
      buttonEl.addEventListener("pointerleave", (e) => {
        if ((e.buttons || 0) === 0) {
          release(e);
        }
      });
    }

    function startBarDrive(trackEl, side, evt) {
      evt.preventDefault();
      state.barDragging = true;
      state.barPointerId = evt.pointerId;
      trackEl.setPointerCapture(evt.pointerId);

      // Fresh bar-drive start: default the untouched side to zero
      // so one-bar control only powers one motor.
      state.barLeftPct = 0;
      state.barRightPct = 0;

      state.deadman = true;
      renderStatus();

      const pct = barPowerFromPointer(trackEl, evt) * 100;
      if (side === "left") {
        applyBarDrive(pct, state.barRightPct);
      } else {
        applyBarDrive(state.barLeftPct, pct);
      }
    }

    function moveBarDrive(trackEl, side, evt) {
      if (!state.barDragging || evt.pointerId !== state.barPointerId) return;
      evt.preventDefault();
      const pct = barPowerFromPointer(trackEl, evt) * 100;
      if (side === "left") {
        applyBarDrive(pct, state.barRightPct);
      } else {
        applyBarDrive(state.barLeftPct, pct);
      }
    }

    function endBarDrive(evt) {
      if (evt && state.barPointerId !== null && evt.pointerId !== state.barPointerId) {
        return;
      }
      state.barDragging = false;
      state.barModeActive = false;
      state.barPointerId = null;
      state.barLeftPct = 0;
      state.barRightPct = 0;
      throttleEl.value = "0";
      steerEl.value = "0";
      setJoystickVisual(0, 0);
      setDeadman(false);
      updateNumbers();
    }

    function joystickCoords(evt) {
      const rect = joystickEl.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      let x = (evt.clientX - cx) / (rect.width / 2);
      let y = (evt.clientY - cy) / (rect.height / 2);
      const mag = Math.hypot(x, y);
      if (mag > 1) {
        x /= mag;
        y /= mag;
      }
      return { x, y };
    }

    joystickEl.addEventListener("pointerdown", (e) => {
      e.preventDefault();
      joystickEl.setPointerCapture(e.pointerId);
      setDeadman(true);
      const p = joystickCoords(e);
      applyJoystick(p.x, p.y);
    });

    joystickEl.addEventListener("pointermove", (e) => {
      if (!state.deadman) return;
      const p = joystickCoords(e);
      applyJoystick(p.x, p.y);
    });

    function releaseJoystick(e) {
      if (e) {
        e.preventDefault();
      }
      state.barModeActive = false;
      steerEl.value = "0";
      throttleEl.value = "0";
      setJoystickVisual(0, 0);
      setDeadman(false);
      updateNumbers();
    }

    joystickEl.addEventListener("pointerup", releaseJoystick);
    joystickEl.addEventListener("pointercancel", releaseJoystick);
    joystickEl.addEventListener("lostpointercapture", releaseJoystick);

    leftMotorTrackEl.addEventListener("pointerdown", (e) => startBarDrive(leftMotorTrackEl, "left", e));
    rightMotorTrackEl.addEventListener("pointerdown", (e) => startBarDrive(rightMotorTrackEl, "right", e));
    leftMotorTrackEl.addEventListener("pointermove", (e) => moveBarDrive(leftMotorTrackEl, "left", e));
    rightMotorTrackEl.addEventListener("pointermove", (e) => moveBarDrive(rightMotorTrackEl, "right", e));
    leftMotorTrackEl.addEventListener("pointerup", endBarDrive);
    rightMotorTrackEl.addEventListener("pointerup", endBarDrive);
    leftMotorTrackEl.addEventListener("pointercancel", endBarDrive);
    rightMotorTrackEl.addEventListener("pointercancel", endBarDrive);
    leftMotorTrackEl.addEventListener("lostpointercapture", endBarDrive);
    rightMotorTrackEl.addEventListener("lostpointercapture", endBarDrive);

    for (const ev of ["mousedown", "touchstart", "pointerdown"]) {
      deadmanEl.addEventListener(ev, (e) => {
        e.preventDefault();
        setDeadman(true);
      });
    }
    for (const ev of ["mouseup", "mouseleave", "touchend", "touchcancel", "pointerup", "pointercancel"]) {
      deadmanEl.addEventListener(ev, (e) => {
        e.preventDefault();
        setDeadman(false);
      });
    }

    estopEl.addEventListener("click", emergencyStop);
    frontLightEl.addEventListener("click", () => toggleLight("front"));
    backLightEl.addEventListener("click", () => toggleLight("back"));
    flipLeftEl.addEventListener("click", () => flipSide("right"));
    flipRightEl.addEventListener("click", () => flipSide("left"));
    bindHoldAction(dumperUpEl, "up");
    bindHoldAction(dumperDownEl, "down");
    swapLayoutEl.addEventListener("click", () => {
      state.swapSides = !state.swapSides;
      localStorage.setItem("roverSwapSides", state.swapSides ? "1" : "0");
      applyLayoutSwap();
    });
    cameraToggleEl.addEventListener("click", () => {
      state.cameraEnabled = !state.cameraEnabled;
      localStorage.setItem("roverCameraEnabled", state.cameraEnabled ? "1" : "0");
      if (state.cameraEnabled) {
        cameraEl.src = CAMERA_SRC;
      } else {
        cameraEl.removeAttribute("src");
        state.cameraOk = false;
      }
      renderStatus();
    });
    statusToggleEl.addEventListener("click", () => {
      statusEl.classList.toggle("expanded");
      syncStatusOverflow();
    });
    window.addEventListener("resize", syncStatusOverflow);

    throttleEl.addEventListener("input", () => {
      updateNumbers();
      markControlDirty();
    });
    steerEl.addEventListener("input", () => {
      updateNumbers();
      markControlDirty();
    });
    maxDacEl.addEventListener("input", () => {
      updateNumbers();
      markControlDirty();
    });
    joyMinThrottleEl.addEventListener("input", () => {
      updateNumbers();
    });
    joyMaxThrottleEl.addEventListener("input", () => {
      updateNumbers();
    });

    function keyToControl(code) {
      if (code === "ArrowUp" || code === "KeyW") return "up";
      if (code === "ArrowDown" || code === "KeyS") return "down";
      if (code === "ArrowLeft" || code === "KeyA") return "left";
      if (code === "ArrowRight" || code === "KeyD") return "right";
      return "";
    }

    function applyKeyDrive() {
      state.barModeActive = false;
      const steer = (keyState.left ? -100 : 0) + (keyState.right ? 100 : 0);
      const throttle = (keyState.up ? 100 : 0) + (keyState.down ? -100 : 0);
      throttleEl.value = String(throttle);
      steerEl.value = String(Math.max(-100, Math.min(100, steer)));

      const driving = keyState.up || keyState.down || keyState.left || keyState.right;
      state.deadman = driving;
      setJoystickVisual(steer / 100, -throttle / 100);
      updateNumbers();
      renderStatus();
      markControlDirty();
    }

    window.addEventListener("keydown", (e) => {
      if (e.code === "Space") {
        emergencyStop();
        e.preventDefault();
        return;
      }

      const mapped = keyToControl(e.code);
      if (!mapped) return;
      keyState[mapped] = true;
      applyKeyDrive();
      e.preventDefault();
    });

    window.addEventListener("keyup", (e) => {
      const mapped = keyToControl(e.code);
      if (!mapped) return;
      keyState[mapped] = false;
      applyKeyDrive();
      e.preventDefault();
    });

    window.addEventListener("blur", () => {
      releaseDumperControls();
      keyState.up = false;
      keyState.down = false;
      keyState.left = false;
      keyState.right = false;
      applyKeyDrive();
    });

    document.addEventListener("visibilitychange", () => {
      if (document.hidden) {
        releaseDumperControls();
        emergencyStop();
      }
    });

    window.addEventListener("beforeunload", () => {
      releaseDumperControls();
      if (navigator.sendBeacon) {
        navigator.sendBeacon("/api/stop", "");
      }
    });

    connectWs();
    applyLayoutSwap();
    if (!state.cameraEnabled) {
      cameraEl.removeAttribute("src");
    }
    setJoystickVisual(0, 0);
    updateNumbers();
    renderStatus();
    syncStatusOverflow();
    setInterval(() => sendControl(false), CONTROL_SEND_INTERVAL_MS);
    setInterval(pollStatus, STATUS_POLL_INTERVAL_MS);
  </script>
</body>
</html>
