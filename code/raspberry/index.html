<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#12161a">
  <title>Rover Control</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    :root {
      --steel-1: #1a1d20;
      --steel-2: #2a2f34;
      --steel-3: #3b434a;
      --plate: #14181c;
      --panel: #20262b;
      --panel-2: #171b1f;
      --cat-yellow: #f1c40f;
      --cat-yellow-dim: #c99e06;
      --warn: #d6452a;
      --ok: #8abf46;
      --text: #f4f6f8;
      --muted: #a2adb8;
      --line: #47525d;
    }
    html, body {
      width: 100%;
      min-height: 100%;
      overflow-x: hidden;
      overflow-y: auto;
      background: #12161a;
    }
    body {
      margin: 0;
      font-family: "Arial Black", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        linear-gradient(0deg, rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.3)),
        repeating-linear-gradient(
          -45deg,
          #0f1215 0 18px,
          #12161a 18px 36px
        );
    }
    .wrap {
      max-width: none;
      width: 100%;
      margin: 0 auto;
      padding: 20px 14px calc(24px + env(safe-area-inset-bottom));
      display: grid;
      gap: 16px;
      min-height: 100dvh;
      box-sizing: border-box;
      grid-template-rows: auto auto;
    }
    .panel {
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(0, 0, 0, 0.1)),
        linear-gradient(180deg, var(--panel), var(--panel-2));
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.06);
    }
    h1 {
      margin: 0;
      font-size: 1.45rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--cat-yellow);
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
    }
    .panel:first-child {
      border-top: 4px solid var(--cat-yellow);
    }
    .grid {
      display: grid;
      gap: 10px;
      grid-template-columns: 1fr;
      grid-template-rows: auto auto;
      min-height: 0;
      overflow: visible;
      align-items: start;
    }
    .grid > .panel {
      min-height: 0;
      height: auto;
    }
    .grid.swap-sides #controlPanel {
      order: 2;
    }
    .grid.swap-sides #cameraPanel {
      order: 1;
    }
    @media (min-width: 900px) {
      .grid {
        grid-template-columns: 1fr 1fr;
        grid-template-rows: 1fr;
      }
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
    }
    .layout-btn {
      padding: 8px 10px;
      font-size: 0.8rem;
      background: linear-gradient(180deg, #ffd845, #bd9206);
      color: #1a1a1a;
      border: 1px solid #f5d358;
      white-space: nowrap;
    }
    .collapsible {
      border: 1px solid #4e5963;
      border-radius: 8px;
      padding: 6px 8px;
      margin-bottom: 10px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(0, 0, 0, 0.12));
    }
    .collapsible > summary {
      cursor: pointer;
      user-select: none;
      color: #d7dde4;
      font-size: 0.78rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      font-weight: 800;
      list-style: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .collapsible > summary::-webkit-details-marker {
      display: none;
    }
    .collapsible > summary::before {
      content: ">";
      color: var(--cat-yellow);
      transform: rotate(0deg);
      transition: transform 0.12s ease;
      font-family: monospace;
      font-size: 0.95rem;
      line-height: 1;
    }
    .collapsible[open] > summary::before {
      transform: rotate(90deg);
    }
    .collapsible-body {
      margin-top: 6px;
    }
    .row {
      display: grid;
      gap: 10px;
      grid-template-columns: 1fr;
      align-items: center;
      margin: 10px 0;
    }
    .row-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }
    label {
      font-weight: 800;
      font-size: 0.88rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #d7dde4;
    }
    .value-pill {
      min-width: 56px;
      text-align: right;
      font-family: "Consolas", "Courier New", monospace;
      font-size: 0.85rem;
      color: #111;
      background: linear-gradient(180deg, #ffd845, #c99e06);
      border: 1px solid #f5d358;
      border-radius: 999px;
      padding: 3px 10px;
      font-weight: 800;
    }
    input[type="range"] {
      width: 100%;
      accent-color: var(--cat-yellow);
      -webkit-appearance: none;
      appearance: none;
      background: transparent;
      height: 34px;
    }
    input[type="range"]::-webkit-slider-runnable-track {
      height: 10px;
      border-radius: 999px;
      border: 1px solid #58626c;
      background:
        repeating-linear-gradient(
          -45deg,
          #2d353d 0 8px,
          #253038 8px 16px
        );
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.35);
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 22px;
      height: 22px;
      margin-top: -7px;
      border-radius: 4px;
      border: 1px solid #f5d358;
      background: linear-gradient(180deg, #ffd845, #bd9206);
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.45);
    }
    input[type="range"]::-moz-range-track {
      height: 10px;
      border-radius: 999px;
      border: 1px solid #58626c;
      background:
        repeating-linear-gradient(
          -45deg,
          #2d353d 0 8px,
          #253038 8px 16px
        );
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.35);
    }
    input[type="range"]::-moz-range-thumb {
      width: 22px;
      height: 22px;
      border-radius: 4px;
      border: 1px solid #f5d358;
      background: linear-gradient(180deg, #ffd845, #bd9206);
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.45);
    }
    .numbers {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 0.84rem;
      font-family: "Consolas", "Courier New", monospace;
      background: #101317;
      border: 1px solid #3a424a;
      border-radius: 8px;
      padding: 10px;
    }
    .status {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      font-size: 0.88rem;
    }
    .badge {
      background: linear-gradient(180deg, #2a3138, #1a1f24);
      border: 1px solid #4f5963;
      border-radius: 999px;
      padding: 5px 10px;
      font-weight: 700;
    }
    .ok { color: var(--ok); }
    .warn { color: #ff8b72; }
    .btns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 8px;
    }
    button {
      border: 1px solid #59636e;
      border-radius: 8px;
      padding: 12px;
      font-weight: 800;
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      cursor: pointer;
      transition: transform 0.1s ease, filter 0.1s ease;
    }
    button:active {
      transform: translateY(1px);
      filter: brightness(0.95);
    }
    #deadman {
      background: linear-gradient(180deg, #ffd845, var(--cat-yellow-dim));
      color: #171717;
      border: 1px solid #f5d358;
      touch-action: none;
    }
    #estop {
      background: linear-gradient(180deg, #df5138, #9f2718);
      color: #fff;
      border: 1px solid #f07a64;
    }
    #flipLeft,
    #flipRight {
      background: linear-gradient(180deg, #56616c, #303840);
      color: #f4f6f8;
      border: 1px solid #7a8792;
    }
    .camera {
      width: 100%;
      border-radius: 8px;
      border: 2px solid #5b6670;
      background: #101317;
      height: auto;
      min-height: 0;
      object-fit: cover;
      box-shadow: inset 0 0 0 1px #101317;
    }
    #cameraPanel {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .hint {
      color: var(--muted);
      font-size: 0.87rem;
    }
    .joystick-wrap {
      margin: 8px 0;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .drive-zone {
      position: relative;
      min-height: 182px;
      margin: 6px 0 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .motor-bar-track {
      width: 88px;
      position: absolute;
      top: 0;
      bottom: 0;
      border: 1px solid #5c6670;
      border-radius: 5px;
      background: linear-gradient(180deg, #1b2025, #101317);
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.45);
      overflow: hidden;
      display: flex;
      align-items: flex-end;
      touch-action: none;
      cursor: ns-resize;
    }
    .motor-bar-track.left {
      left: 0;
    }
    .motor-bar-track.right {
      right: 0;
    }
    .motor-bar-fill {
      width: 100%;
      height: 0%;
      background: linear-gradient(180deg, #ffe067, #f1c40f 55%, #c99900);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.25);
      transition: height 0.08s linear;
      pointer-events: none;
    }
    .joystick {
      width: min(62vw, 280px);
      height: min(62vw, 280px);
      max-width: 280px;
      max-height: 280px;
      border-radius: 50%;
      border: 3px solid #6c7782;
      background:
        radial-gradient(circle at 50% 50%, rgba(241, 196, 15, 0.15) 0 16%, transparent 17% 100%),
        linear-gradient(
          180deg,
          rgba(138, 191, 70, 0.25) 0 40%,
          rgba(241, 196, 15, 0.23) 40% 60%,
          rgba(214, 69, 42, 0.26) 60% 100%
        ),
        radial-gradient(circle at 50% 50%, #303840 0, #232a31 66%, #171d22 100%);
      position: relative;
      touch-action: none;
      box-shadow: inset 0 4px 18px rgba(0, 0, 0, 0.45), 0 8px 16px rgba(0, 0, 0, 0.4);
    }
    .zone-label {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.62rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      color: rgba(243, 247, 251, 0.85);
      text-shadow: 0 1px 4px rgba(0, 0, 0, 0.6);
      pointer-events: none;
      user-select: none;
    }
    .zone-top {
      top: 14%;
    }
    .zone-mid {
      top: 50%;
      transform: translate(-50%, -50%);
    }
    .zone-bottom {
      bottom: 14%;
    }
    .joystick-knob {
      width: 76px;
      height: 76px;
      border-radius: 50%;
      border: 3px solid #8d98a3;
      background: radial-gradient(circle at 35% 30%, #606a75 0, #434c55 55%, #2f363d 100%);
      position: absolute;
      left: calc(50% - 38px);
      top: calc(50% - 38px);
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.45);
      transition: transform 0.05s linear;
      pointer-events: none;
    }
    @media (max-width: 680px) {
      .wrap {
        padding: 10px 8px calc(12px + env(safe-area-inset-bottom));
        gap: 8px;
      }
      .panel {
        padding: 9px;
      }
      .drive-zone {
        min-height: 150px;
      }
      h1 {
        font-size: 1.05rem;
      }
      .status {
        font-size: 0.72rem;
        gap: 6px;
      }
      .badge {
        padding: 4px 8px;
      }
      .row {
        gap: 4px;
        margin: 5px 0;
      }
      label {
        font-size: 0.73rem;
      }
      .value-pill {
        min-width: 44px;
        font-size: 0.72rem;
        padding: 2px 8px;
      }
      input[type="range"] {
        height: 24px;
      }
      input[type="range"]::-webkit-slider-runnable-track,
      input[type="range"]::-moz-range-track {
        height: 8px;
      }
      input[type="range"]::-webkit-slider-thumb,
      input[type="range"]::-moz-range-thumb {
        width: 18px;
        height: 18px;
        margin-top: -6px;
      }
      .joystick {
        width: min(46vw, 170px);
        height: min(46vw, 170px);
      }
      .motor-bar-track {
        width: 60px;
      }
      .joystick-knob {
        width: 50px;
        height: 50px;
        left: calc(50% - 25px);
        top: calc(50% - 25px);
      }
      .numbers {
        font-size: 0.68rem;
        padding: 6px;
      }
      .btns {
        gap: 6px;
      }
      button {
        font-size: 0.74rem;
        padding: 8px;
      }
      .camera {
        height: auto;
      }
      .hint {
        display: none;
      }
    }
    @media (max-height: 540px) and (orientation: landscape) {
      .wrap {
        max-width: 1220px;
        padding: 8px calc(8px + env(safe-area-inset-right)) calc(10px + env(safe-area-inset-bottom)) calc(8px + env(safe-area-inset-left));
        gap: 8px;
      }
      .grid {
        grid-template-columns: 1fr 1fr;
      }
      .panel {
        padding: 8px;
      }
      .drive-zone {
        min-height: 118px;
      }
      .row {
        margin: 3px 0;
        gap: 3px;
      }
      label {
        font-size: 0.68rem;
      }
      .value-pill {
        min-width: 40px;
        font-size: 0.66rem;
        padding: 2px 6px;
      }
      .joystick {
        width: min(29vw, 140px);
        height: min(29vw, 140px);
      }
      .motor-bar-track {
        width: 56px;
      }
      .joystick-knob {
        width: 44px;
        height: 44px;
        left: calc(50% - 22px);
        top: calc(50% - 22px);
      }
      .numbers {
        display: none;
      }
      .btns {
        gap: 6px;
      }
      button {
        font-size: 0.72rem;
        padding: 7px;
      }
      .camera {
        height: auto;
      }
      .status {
        font-size: 0.72rem;
      }
      .layout-btn {
        font-size: 0.68rem;
        padding: 7px 8px;
      }
      .hint {
        display: none;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="panel">
      <div class="topbar">
        <h1>Rover Control</h1>
        <button class="layout-btn" id="swapLayout">Toggle Joystick Side</button>
      </div>
      <div class="status" id="statusBadges"></div>
    </section>

    <section class="grid" id="mainGrid">
      <article class="panel" id="controlPanel">
        <details class="collapsible" id="sliderPanel">
          <summary>Slider Controls</summary>
          <div class="collapsible-body">
            <div class="row">
              <div class="row-head">
                <label for="throttle">Throttle</label>
                <span class="value-pill" id="throttleVal">0%</span>
              </div>
              <input id="throttle" type="range" min="-100" max="100" value="0">
            </div>
            <div class="row">
              <div class="row-head">
                <label for="steer">Steer (left/right)</label>
                <span class="value-pill" id="steerVal">0%</span>
              </div>
              <input id="steer" type="range" min="-100" max="100" value="0">
            </div>
            <div class="row">
              <div class="row-head">
                <label for="maxDac">Max output limit (DAC)</label>
                <span class="value-pill" id="maxDacVal">180</span>
              </div>
              <input id="maxDac" type="range" min="0" max="255" value="180">
            </div>
            <div class="row">
              <div class="row-head">
                <label for="joyMinThrottle">Joystick min throttle (%)</label>
                <span class="value-pill" id="joyMinThrottleVal">45%</span>
              </div>
              <input id="joyMinThrottle" type="range" min="0" max="100" value="45">
            </div>
            <div class="row">
              <div class="row-head">
                <label for="joyMaxThrottle">Joystick max throttle (%)</label>
                <span class="value-pill" id="joyMaxThrottleVal">70%</span>
              </div>
              <input id="joyMaxThrottle" type="range" min="0" max="100" value="70">
            </div>
          </div>
        </details>

        <div class="drive-zone">
          <div class="motor-bar-track left" id="leftMotorTrack">
            <div class="motor-bar-fill" id="leftMotorBar"></div>
          </div>
          <div class="motor-bar-track right" id="rightMotorTrack">
            <div class="motor-bar-fill" id="rightMotorBar"></div>
          </div>
          <div class="joystick-wrap">
            <div class="joystick" id="joystick" aria-label="Drive joystick" role="application">
              <span class="zone-label zone-top">FWD</span>
              <span class="zone-label zone-mid">PIVOT</span>
              <span class="zone-label zone-bottom">REV</span>
              <div class="joystick-knob" id="joystickKnob"></div>
            </div>
          </div>
        </div>

        <div class="numbers" id="numbers"></div>

        <div class="btns">
          <button id="deadman">Hold To Drive</button>
          <button id="estop">EMERGENCY STOP</button>
          <button id="flipLeft">Flip Left</button>
          <button id="flipRight">Flip Right</button>
        </div>
        <p class="hint">Keyboard: hold Arrow keys (or W/A/S/D) to drive forward/reverse, Space stop. Releasing keys sends 0,0.</p>
      </article>

      <article class="panel" id="cameraPanel">
        <img class="camera" id="camera" src="/api/camera.mjpg" alt="USB camera stream">
        <p class="hint">Live USB camera stream from Raspberry Pi.</p>
      </article>
    </section>
  </main>

  <script>
    const throttleEl = document.getElementById("throttle");
    const steerEl = document.getElementById("steer");
    const maxDacEl = document.getElementById("maxDac");
    const joyMinThrottleEl = document.getElementById("joyMinThrottle");
    const joyMaxThrottleEl = document.getElementById("joyMaxThrottle");
    const throttleValEl = document.getElementById("throttleVal");
    const steerValEl = document.getElementById("steerVal");
    const maxDacValEl = document.getElementById("maxDacVal");
    const joyMinThrottleValEl = document.getElementById("joyMinThrottleVal");
    const joyMaxThrottleValEl = document.getElementById("joyMaxThrottleVal");
    const leftMotorTrackEl = document.getElementById("leftMotorTrack");
    const rightMotorTrackEl = document.getElementById("rightMotorTrack");
    const leftMotorBarEl = document.getElementById("leftMotorBar");
    const rightMotorBarEl = document.getElementById("rightMotorBar");
    const numbersEl = document.getElementById("numbers");
    const statusEl = document.getElementById("statusBadges");
    const mainGridEl = document.getElementById("mainGrid");
    const swapLayoutEl = document.getElementById("swapLayout");
    const deadmanEl = document.getElementById("deadman");
    const estopEl = document.getElementById("estop");
    const flipLeftEl = document.getElementById("flipLeft");
    const flipRightEl = document.getElementById("flipRight");
    const joystickEl = document.getElementById("joystick");
    const joystickKnobEl = document.getElementById("joystickKnob");

    function getClientId() {
      const key = "roverClientId";
      const existing = sessionStorage.getItem(key);
      if (existing) return existing;
      const created = `client-${Math.random().toString(36).slice(2, 10)}`;
      sessionStorage.setItem(key, created);
      return created;
    }

    const state = {
      deadman: false,
      ws: null,
      wsConnected: false,
      usingHttpFallback: false,
      swapSides: localStorage.getItem("roverSwapSides") === "1",
      clientId: getClientId(),
      serialConnected: false,
      esp32AppRunning: false,
      cameraOk: false,
      leftDirection: "forward",
      rightDirection: "forward",
      leftRelayActive: false,
      rightRelayActive: false,
      driveMode: "idle",
      ack: "",
      outputLeft: 0,
      outputRight: 0,
      lastHttpSendMs: 0,
      barDragging: false,
      barModeActive: false,
      barPointerId: null,
      barLeftPct: 0,
      barRightPct: 0,
    };

    const keyState = {
      up: false,
      down: false,
      left: false,
      right: false,
    };

    const JOY_PIVOT_BAND = 0.20;
    const JOY_STEER_DEADZONE = 0.10;

    function norm(value) {
      return Math.max(-1, Math.min(1, value));
    }

    function payload() {
      const msg = {
        throttle: norm(Number(throttleEl.value) / 100),
        steer: norm(Number(steerEl.value) / 100),
        deadman: state.deadman,
        max_dac: Number(maxDacEl.value),
        client_id: state.clientId,
      };

      if (state.barModeActive) {
        msg.left_cmd = norm(state.barLeftPct / 100);
        msg.right_cmd = norm(state.barRightPct / 100);
      }

      return msg;
    }

    function applyLayoutSwap() {
      mainGridEl.classList.toggle("swap-sides", state.swapSides);
      swapLayoutEl.textContent = "Toggle Joystick Side";
    }

    function joystickThrottlePercent(forwardAmount) {
      const amount = Math.max(0, Math.min(1, forwardAmount));
      if (amount <= 0) {
        return 0;
      }

      const minT = Math.max(0, Math.min(100, Number(joyMinThrottleEl.value)));
      const maxT = Math.max(0, Math.min(100, Number(joyMaxThrottleEl.value)));
      const low = Math.min(minT, maxT);
      const high = Math.max(minT, maxT);
      return Math.round(low + amount * (high - low));
    }

    function syncSliderDisplays() {
      throttleValEl.textContent = `${throttleEl.value}%`;
      steerValEl.textContent = `${steerEl.value}%`;
      maxDacValEl.textContent = `${maxDacEl.value}`;
      joyMinThrottleValEl.textContent = `${joyMinThrottleEl.value}%`;
      joyMaxThrottleValEl.textContent = `${joyMaxThrottleEl.value}%`;

      const maxOut = Math.max(0, Math.min(255, Number(maxDacEl.value)));
      const leftOut = Math.max(0, Math.min(maxOut, Number(state.outputLeft) || 0));
      const rightOut = Math.max(0, Math.min(maxOut, Number(state.outputRight) || 0));
      const leftPct = maxOut > 0 ? (leftOut / maxOut) * 100 : 0;
      const rightPct = maxOut > 0 ? (rightOut / maxOut) * 100 : 0;
      leftMotorBarEl.style.height = `${leftPct}%`;
      rightMotorBarEl.style.height = `${rightPct}%`;
    }

    function updateNumbers() {
      syncSliderDisplays();
      numbersEl.textContent = `throttle=${throttleEl.value} steer=${steerEl.value} joy_min=${joyMinThrottleEl.value} joy_max=${joyMaxThrottleEl.value} max_dac=${maxDacEl.value} dir=${state.leftDirection}/${state.rightDirection} output=${state.outputLeft},${state.outputRight} ack=${state.ack || "-"}`;
    }

    function badge(label, ok) {
      const cls = ok ? "ok" : "warn";
      return `<span class="badge ${cls}">${label}</span>`;
    }

    function renderStatus() {
      const transportLabel = state.wsConnected ? "ws connected" : (state.usingHttpFallback ? "http fallback" : "ws offline");
      statusEl.innerHTML = [
        badge(transportLabel, state.wsConnected || state.usingHttpFallback),
        badge(`serial ${state.serialConnected ? "connected" : "offline"}`, state.serialConnected),
        badge(`esp32 app ${state.esp32AppRunning ? "running" : "not running"}`, state.esp32AppRunning),
        badge(`left ${state.leftDirection}${state.leftRelayActive ? " flipping" : ""}`, !state.leftRelayActive),
        badge(`right ${state.rightDirection}${state.rightRelayActive ? " flipping" : ""}`, !state.rightRelayActive),
        badge(`mode ${state.driveMode}`, true),
        badge(`camera ${state.cameraOk ? "ok" : "no frame"}`, state.cameraOk),
        badge(`deadman ${state.deadman ? "held" : "released"}`, state.deadman),
      ].join(" ");
    }

    async function sendControl() {
      const msg = payload();
      if (!state.ws || state.ws.readyState !== WebSocket.OPEN) {
        const now = Date.now();
        if (now - state.lastHttpSendMs < 120) {
          return;
        }
        state.lastHttpSendMs = now;
        try {
          await fetch("/api/control", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(msg),
          });
          state.usingHttpFallback = true;
        } catch (_) {
          state.usingHttpFallback = false;
        }
        renderStatus();
        return;
      }
      state.ws.send(JSON.stringify(msg));
    }

    function connectWs() {
      const proto = location.protocol === "https:" ? "wss" : "ws";
      const ws = new WebSocket(`${proto}://${location.host}/ws`);
      state.ws = ws;
      ws.onopen = () => {
        state.wsConnected = true;
        state.usingHttpFallback = false;
        renderStatus();
      };
      ws.onclose = () => {
        state.wsConnected = false;
        state.usingHttpFallback = true;
        renderStatus();
        setTimeout(connectWs, 1000);
      };
      ws.onerror = () => {
        state.wsConnected = false;
        state.usingHttpFallback = true;
        renderStatus();
      };
    }

    async function pollStatus() {
      try {
        const res = await fetch("/api/status", { cache: "no-store" });
        const data = await res.json();
        state.serialConnected = Boolean(data?.serial?.connected);
        state.esp32AppRunning = Boolean(data?.serial?.app_running);
        state.cameraOk = Boolean(data?.camera?.has_frame);
        state.ack = data?.serial?.last_ack || "";
        state.leftDirection = data?.control?.direction?.left || "forward";
        state.rightDirection = data?.control?.direction?.right || "forward";
        state.leftRelayActive = Boolean(data?.control?.relay?.left_active);
        state.rightRelayActive = Boolean(data?.control?.relay?.right_active);
        state.driveMode = data?.control?.drive_mode || "idle";
        state.outputLeft = data?.control?.output?.left ?? 0;
        state.outputRight = data?.control?.output?.right ?? 0;
      } catch (_) {
        state.serialConnected = false;
        state.esp32AppRunning = false;
        state.driveMode = "idle";
      }
      updateNumbers();
      renderStatus();
    }

    async function emergencyStop() {
      state.deadman = false;
      state.barModeActive = false;
      throttleEl.value = "0";
      steerEl.value = "0";
      renderStatus();
      updateNumbers();
      sendControl();
      await fetch("/api/stop", { method: "POST" });
    }

    function setDeadman(on) {
      state.deadman = on;
      renderStatus();
      sendControl();
    }

    function setJoystickVisual(normX, normY) {
      const maxPx = joystickEl.clientWidth * 0.34;
      const xPx = normX * maxPx;
      const yPx = normY * maxPx;
      joystickKnobEl.style.transform = `translate(${xPx}px, ${yPx}px)`;
    }

    function applyJoystick(normX, normY) {
      state.barModeActive = false;
      const throttleRaw = Math.max(-1, Math.min(1, -normY));
      const throttleMag = Math.abs(throttleRaw);
      const throttle = throttleMag <= JOY_PIVOT_BAND
        ? 0
        : Math.round(Math.sign(throttleRaw) * joystickThrottlePercent((throttleMag - JOY_PIVOT_BAND) / (1 - JOY_PIVOT_BAND)));

      const steerRaw = Math.max(-1, Math.min(1, normX));
      const steerMag = Math.abs(steerRaw);
      const steer = steerMag <= JOY_STEER_DEADZONE
        ? 0
        : Math.round((Math.sign(steerRaw) * (steerMag - JOY_STEER_DEADZONE) / (1 - JOY_STEER_DEADZONE)) * 100);

      steerEl.value = String(Math.max(-100, Math.min(100, steer)));
      throttleEl.value = String(Math.max(-100, Math.min(100, throttle)));
      setJoystickVisual(normX, normY);
      updateNumbers();
      sendControl();
    }

    function barPowerFromPointer(trackEl, evt) {
      const rect = trackEl.getBoundingClientRect();
      const y = evt.clientY - rect.top;
      const norm = 1 - (2 * y / rect.height);
      return Math.max(-1, Math.min(1, norm));
    }

    function applyBarDrive(leftPct, rightPct) {
      const left = Math.max(-100, Math.min(100, leftPct));
      const right = Math.max(-100, Math.min(100, rightPct));
      state.barModeActive = true;
      state.barLeftPct = left;
      state.barRightPct = right;

      const leftNorm = left / 100;
      const rightNorm = right / 100;
      const t = (leftNorm + rightNorm) / 2;
      const steer = (leftNorm - rightNorm) / 2;

      throttleEl.value = String(Math.round(t * 100));
      steerEl.value = String(Math.round(steer * 100));
      setJoystickVisual(steer, -t);

      const maxOut = Math.max(0, Math.min(255, Number(maxDacEl.value)));
      state.outputLeft = Math.round((Math.abs(left) / 100) * maxOut);
      state.outputRight = Math.round((Math.abs(right) / 100) * maxOut);

      updateNumbers();
      sendControl();
    }

    async function flipSide(side) {
      try {
        await fetch(`/api/flip/${side}`, { method: "POST" });
        await pollStatus();
      } catch (_) {
      }
    }

    function startBarDrive(trackEl, side, evt) {
      evt.preventDefault();
      state.barDragging = true;
      state.barPointerId = evt.pointerId;
      trackEl.setPointerCapture(evt.pointerId);

      // Fresh bar-drive start: default the untouched side to zero
      // so one-bar control only powers one motor.
      state.barLeftPct = 0;
      state.barRightPct = 0;

      state.deadman = true;
      renderStatus();

      const pct = barPowerFromPointer(trackEl, evt) * 100;
      if (side === "left") {
        applyBarDrive(pct, state.barRightPct);
      } else {
        applyBarDrive(state.barLeftPct, pct);
      }
    }

    function moveBarDrive(trackEl, side, evt) {
      if (!state.barDragging || evt.pointerId !== state.barPointerId) return;
      evt.preventDefault();
      const pct = barPowerFromPointer(trackEl, evt) * 100;
      if (side === "left") {
        applyBarDrive(pct, state.barRightPct);
      } else {
        applyBarDrive(state.barLeftPct, pct);
      }
    }

    function endBarDrive(evt) {
      if (evt && state.barPointerId !== null && evt.pointerId !== state.barPointerId) {
        return;
      }
      state.barDragging = false;
      state.barModeActive = false;
      state.barPointerId = null;
      state.barLeftPct = 0;
      state.barRightPct = 0;
      throttleEl.value = "0";
      steerEl.value = "0";
      setJoystickVisual(0, 0);
      setDeadman(false);
      updateNumbers();
    }

    function joystickCoords(evt) {
      const rect = joystickEl.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      let x = (evt.clientX - cx) / (rect.width / 2);
      let y = (evt.clientY - cy) / (rect.height / 2);
      const mag = Math.hypot(x, y);
      if (mag > 1) {
        x /= mag;
        y /= mag;
      }
      return { x, y };
    }

    joystickEl.addEventListener("pointerdown", (e) => {
      e.preventDefault();
      joystickEl.setPointerCapture(e.pointerId);
      setDeadman(true);
      const p = joystickCoords(e);
      applyJoystick(p.x, p.y);
    });

    joystickEl.addEventListener("pointermove", (e) => {
      if (!state.deadman) return;
      const p = joystickCoords(e);
      applyJoystick(p.x, p.y);
    });

    function releaseJoystick(e) {
      if (e) {
        e.preventDefault();
      }
      state.barModeActive = false;
      steerEl.value = "0";
      throttleEl.value = "0";
      setJoystickVisual(0, 0);
      setDeadman(false);
      updateNumbers();
    }

    joystickEl.addEventListener("pointerup", releaseJoystick);
    joystickEl.addEventListener("pointercancel", releaseJoystick);
    joystickEl.addEventListener("lostpointercapture", releaseJoystick);

    leftMotorTrackEl.addEventListener("pointerdown", (e) => startBarDrive(leftMotorTrackEl, "left", e));
    rightMotorTrackEl.addEventListener("pointerdown", (e) => startBarDrive(rightMotorTrackEl, "right", e));
    leftMotorTrackEl.addEventListener("pointermove", (e) => moveBarDrive(leftMotorTrackEl, "left", e));
    rightMotorTrackEl.addEventListener("pointermove", (e) => moveBarDrive(rightMotorTrackEl, "right", e));
    leftMotorTrackEl.addEventListener("pointerup", endBarDrive);
    rightMotorTrackEl.addEventListener("pointerup", endBarDrive);
    leftMotorTrackEl.addEventListener("pointercancel", endBarDrive);
    rightMotorTrackEl.addEventListener("pointercancel", endBarDrive);
    leftMotorTrackEl.addEventListener("lostpointercapture", endBarDrive);
    rightMotorTrackEl.addEventListener("lostpointercapture", endBarDrive);

    for (const ev of ["mousedown", "touchstart", "pointerdown"]) {
      deadmanEl.addEventListener(ev, (e) => {
        e.preventDefault();
        setDeadman(true);
      });
    }
    for (const ev of ["mouseup", "mouseleave", "touchend", "touchcancel", "pointerup", "pointercancel"]) {
      deadmanEl.addEventListener(ev, (e) => {
        e.preventDefault();
        setDeadman(false);
      });
    }

    estopEl.addEventListener("click", emergencyStop);
    flipLeftEl.addEventListener("click", () => flipSide("right"));
    flipRightEl.addEventListener("click", () => flipSide("left"));
    swapLayoutEl.addEventListener("click", () => {
      state.swapSides = !state.swapSides;
      localStorage.setItem("roverSwapSides", state.swapSides ? "1" : "0");
      applyLayoutSwap();
    });

    throttleEl.addEventListener("input", () => {
      updateNumbers();
      sendControl();
    });
    steerEl.addEventListener("input", () => {
      updateNumbers();
      sendControl();
    });
    maxDacEl.addEventListener("input", () => {
      updateNumbers();
      sendControl();
    });
    joyMinThrottleEl.addEventListener("input", () => {
      updateNumbers();
    });
    joyMaxThrottleEl.addEventListener("input", () => {
      updateNumbers();
    });

    function keyToControl(code) {
      if (code === "ArrowUp" || code === "KeyW") return "up";
      if (code === "ArrowDown" || code === "KeyS") return "down";
      if (code === "ArrowLeft" || code === "KeyA") return "left";
      if (code === "ArrowRight" || code === "KeyD") return "right";
      return "";
    }

    function applyKeyDrive() {
      state.barModeActive = false;
      const steer = (keyState.left ? -100 : 0) + (keyState.right ? 100 : 0);
      const throttle = (keyState.up ? 100 : 0) + (keyState.down ? -100 : 0);
      throttleEl.value = String(throttle);
      steerEl.value = String(Math.max(-100, Math.min(100, steer)));

      const driving = keyState.up || keyState.down || keyState.left || keyState.right;
      state.deadman = driving;
      setJoystickVisual(steer / 100, -throttle / 100);
      updateNumbers();
      renderStatus();
      sendControl();
    }

    window.addEventListener("keydown", (e) => {
      if (e.code === "Space") {
        emergencyStop();
        e.preventDefault();
        return;
      }

      const mapped = keyToControl(e.code);
      if (!mapped) return;
      keyState[mapped] = true;
      applyKeyDrive();
      e.preventDefault();
    });

    window.addEventListener("keyup", (e) => {
      const mapped = keyToControl(e.code);
      if (!mapped) return;
      keyState[mapped] = false;
      applyKeyDrive();
      e.preventDefault();
    });

    window.addEventListener("blur", () => {
      keyState.up = false;
      keyState.down = false;
      keyState.left = false;
      keyState.right = false;
      applyKeyDrive();
    });

    document.addEventListener("visibilitychange", () => {
      if (document.hidden) {
        emergencyStop();
      }
    });

    window.addEventListener("beforeunload", () => {
      if (navigator.sendBeacon) {
        navigator.sendBeacon("/api/stop", "");
      }
    });

    connectWs();
    applyLayoutSwap();
    setJoystickVisual(0, 0);
    updateNumbers();
    renderStatus();
    setInterval(sendControl, 60);
    setInterval(pollStatus, 150);
  </script>
</body>
</html>
